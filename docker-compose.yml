version: '3.8'
services:
  api:
    build: ./api/TeeTimeAutomator.API
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=postgresql://postgres:[YOUR-PASSWORD]@db.srflomconujkwmrwstpm.supabase.co:5432/postgres?sslmode=require
      - Jwt__Secret=CHANGE_THIS_SECRET_KEY_MIN_32_CHARS_IN_PRODUCTION
      - Jwt__Issuer=TeeTimeAutomator
      - Jwt__Audience=TeeTimeAutomator
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - teetime-network
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - teetime-network
    restart: unless-stopped

networks:
  teetime-network:
    driver: bridge
