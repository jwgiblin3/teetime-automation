    <div class="login-container">
      <mat-card class="login-card">
        <mat-card-header>
          <div class="header-icon">
            <mat-icon>golf_course</mat-icon>
          </div>
          <mat-card-title>TeeTime Automator</mat-card-title>
          <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>Email</mat-label>
              <input
                matInput
                type="email"
                formControlName="email"
                placeholder="your@email.com"
              />
              <mat-error *ngIf="getControl('email')?.hasError('required')">
                Email is required
              </mat-error>
              <mat-error *ngIf="getControl('email')?.hasError('email')">
                Please enter a valid email
              </mat-error>
            </mat-form-field>

            <mat-form-field class="full-width" appearance="outline">
              <mat-label>Password</mat-label>
              <input
                matInput
                [type]="hidePassword ? 'password' : 'text'"
                formControlName="password"
                placeholder="Enter your password"
              />
              <button
                mat-icon-button
                matSuffix
                (click)="hidePassword = !hidePassword"
                type="button"
              >
                <mat-icon>
                  {{ hidePassword ? 'visibility_off' : 'visibility' }}
                </mat-icon>
              </button>
              <mat-error *ngIf="getControl('password')?.hasError('required')">
                Password is required
              </mat-error>
            </mat-form-field>

            <div class="button-group">
              <button
                mat-raised-button
                color="primary"
                type="submit"
                [disabled]="loading || loginForm.invalid"
              >
                <mat-icon *ngIf="!loading">login</mat-icon>
                <mat-spinner
                  *ngIf="loading"
                  diameter="20"
                  class="inline-spinner"
                ></mat-spinner>
                {{ loading ? 'Signing in...' : 'Sign In' }}
              </button>

              <button
                mat-stroked-button
                type="button"
                class="google-btn"
                (click)="loginWithGoogle()"
                [disabled]="loading"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#1f2937"
                  />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34a853"
                  />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#fbbc05"
                  />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#ea4335"
                  />
                </svg>
                Sign in with Google
              </button>
            </div>
          </form>

          <div class="divider">or</div>

          <div class="register-link">
            Don't have an account?
            <a routerLink="/register" class="link">Create one now</a>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
