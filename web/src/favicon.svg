<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a1a2e"/>
  <!-- Golf flag on pole -->
  <line x1="17" y1="6" x2="17" y2="26" stroke="#4caf50" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flag triangle -->
  <polygon points="17,6 26,10 17,14" fill="#4caf50"/>
  <!-- Golf ball (small circle at base) -->
  <circle cx="17" cy="27" r="3" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <!-- Ball dimple hint -->
  <circle cx="16" cy="26.5" r="0.6" fill="#c8e6c9" opacity="0.6"/>
  <circle cx="18" cy="27.5" r="0.6" fill="#c8e6c9" opacity="0.6"/>
</svg>
